name: Package Smart Web Fetch Skill

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-skill:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build smart-web-fetch.zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package-root
          cp -R skills/smart-web-fetch dist/package-root/smart-web-fetch
          (
            cd dist/package-root
            zip -r ../smart-web-fetch.zip smart-web-fetch
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-web-fetch.zip
          path: dist/smart-web-fetch.zip
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/smart-web-fetch.zip
          generate_release_notes: false
          name: Smart Web Fetch ${{ github.ref_name }}
          body: |
            Smart Web Fetch 首个公开发行版。

            亮点：
            - 提供可直接下载使用的 `smart-web-fetch.zip`
            - 统一 Bash、PowerShell 和 Windows 包装器的命令入口
            - 面向 Markdown 输出的多服务网页抓取能力

            快速开始：
            - 下载 `smart-web-fetch.zip`
            - 解压后在包根目录运行

            ---

            First public release of Smart Web Fetch.

            Highlights:
            - Packaged `smart-web-fetch.zip` for direct download
            - Unified command interface across Bash, PowerShell, and Windows wrappers
            - Multi-provider web fetching with Markdown-oriented output

            Getting started:
            - Download `smart-web-fetch.zip`
            - Extract it and run from the package root directory
