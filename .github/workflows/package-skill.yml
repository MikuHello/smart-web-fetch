name: Package Smart Web Fetch Skill

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-skill:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build smart-web-fetch.zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package-root
          cp -R skills/smart-web-fetch dist/package-root/smart-web-fetch
          (
            cd dist/package-root
            zip -r ../smart-web-fetch.zip smart-web-fetch
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-web-fetch.zip
          path: dist/smart-web-fetch.zip
          if-no-files-found: error

      - name: Check release notes file
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          test -f ".github/release-notes/${GITHUB_REF_NAME}.md"

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/smart-web-fetch.zip
          generate_release_notes: false
          name: Smart Web Fetch ${{ github.ref_name }}
          body_path: .github/release-notes/${{ github.ref_name }}.md
